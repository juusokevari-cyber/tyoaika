<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK-35 Työajan Seuranta</title>
    <style>
        :root {
            --primary: #c0392b; /* PK-35 Punainen */
            --secondary: #e67e22;
            --danger: #962d22;
            --info: #2980b9;
            --bg: #111111; 
            --text: #ffffff;
            --card-bg: rgba(18, 18, 18, 0.92); 
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            /* Varma ja toimiva raidallinen teematausta seuran väreissä */
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.9)),
                repeating-linear-gradient(90deg, #111111 0px, #111111 60px, #700707 60px, #700707 120px);
            background-attachment: fixed;
            background-size: cover, auto;
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        /* ⚽ LOGO SIVUSTON YLÄREUNASSA */
        .club-logo-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .club-logo-img {
            height: 70px; /* Säädä logon kokoa tästä tarvittaessa */
            width: auto;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            border: 1px solid rgba(192, 57, 43, 0.3);
            backdrop-filter: blur(10px);
        }

        h1, h2, h3 {
            color: #ffffff;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .login-box {
            max-width: 400px;
            margin: 80px auto;
            background: var(--card-bg);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            border: 2px solid var(--primary);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 25px;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
            color: #ecf0f1;
        }

        input, select, textarea, button {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            background-color: #1a1a1a;
            color: #fff;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(192, 57, 43, 0.6);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s, transform 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button:hover {
            background-color: #a12f24;
            transform: translateY(-1px);
        }

        .btn-info { background-color: var(--info); margin-top: 10px; }
        .btn-info:hover { background-color: #1f6391; }
        
        .btn-danger { background-color: #555; margin-top: 10px; }
        .btn-danger:hover { background-color: #444; }

        .logout-btn {
            float: right;
            width: auto;
            background-color: #222;
            margin-top: 0;
            padding: 6px 15px;
            border: 1px solid #444;
        }
        .logout-btn:hover { background-color: #333; }

        .filter-box {
            background: rgba(30, 30, 30, 0.7);
            padding: 12px;
            border: 1px solid var(--info);
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .month-section {
            margin-top: 20px;
            border: 1px solid #333;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .month-header {
            background: #1a1a1a;
            color: white;
            padding: 12px;
            font-weight: bold;
            font-size: 1.1em;
            border-bottom: 2px solid var(--primary);
        }

        .accordion-item {
            border-bottom: 1px solid #222;
        }

        .accordion-trigger {
            background: rgba(30, 30, 30, 0.8);
            padding: 12px 15px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .accordion-trigger:hover {
            background: rgba(45, 45, 45, 0.9);
        }

        .accordion-content {
            display: none;
            padding: 10px 20px;
            background: rgba(15, 15, 15, 0.95);
        }

        .day-item {
            margin: 5px 0;
            border: 1px solid #252525;
            border-radius: 4px;
        }

        .day-trigger {
            background: rgba(35, 35, 35, 0.7);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        .day-trigger:hover {
            background: rgba(50, 50, 50, 0.8);
        }

        .day-content {
            display: none;
            padding: 10px 15px;
            background: #0d0d0d;
            border-top: 1px solid #222;
        }

        .pankki-info {
            display: flex;
            justify-content: space-between;
            background: #1a1a1a;
            padding: 8px 12px;
            border-radius: 4px;
            margin-top: 10px;
            margin-bottom: 10px;
            font-weight: bold;
            border: 1px solid #333;
        }

        .saldo-plus { color: #2ecc71; font-weight: bold; }
        .saldo-miinus { color: #e74c3c; font-weight: bold; }

        .tag {
            background: var(--primary);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8em;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        ul { padding-left: 20px; margin-top: 5px; }
        li { margin-bottom: 3px; }
    </style>
</head>
<body>

<div id="loginPage" class="login-box">
    <div class="club-logo-header">
        <img src="PK-35_Helsinki_logo.svg.png" alt="PK-35" class="club-logo-img">
    </div>
    <h2>PK-35 Työaika</h2>
    <p>Syötä henkilökohtainen PIN-koodisi.</p>
    <form id="loginForm">
        <label for="pinCode">PIN-koodi:</label>
        <input type="password" id="pinCode" placeholder="xxxx" maxlength="6" required style="text-align: center; font-size: 1.5em; letter-spacing: 5px;">
        <button type="submit">Kirjaudu</button>
    </form>
</div>

<div id="mainPage" class="container" style="display: none;">
    <button id="logoutBtn" class="logout-btn">🚪 Ulos</button>
    
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
        <img src="PK-35_Helsinki_logo.svg.png" alt="PK-35" style="height: 45px; width: auto;">
        <h1 style="border-bottom:none; padding-bottom:0; margin:0; font-size: 1.8em;">PK-35 Seuranta (<span id="userDisplay"></span>)</h1>
    </div>

    <div class="grid">
        <section>
            <h2>✍️ Kirjaa työaika</h2>
            <form id="workForm">
                <label for="date">Päivämäärä (Kalenteri):</label>
                <input type="date" id="date" required>

                <label for="employee">Työntekijä:</label>
                <select id="employee" required></select>

                <label for="task">Tehtävä / tapahtuma:</label>
                <select id="task" required>
                    <option value="">Valitse tehtävä listasta...</option>
                    <option value="Ottelut tapahtumat">Ottelut tapahtumat</option>
                    <option value="Harjoitukset">Harjoitukset</option>
                    <option value="Suunnittelu">Suunnittelu</option>
                    <option value="Raportointi">Raportointi</option>
                    <option value="Turnausjärjestelyt">Turnausjärjestelyt</option>
                    <option value="Futiskoulu">Futiskoulu</option>
                    <option value="Perhefutis">Perhefutis</option>
                    <option value="Minifutis">Minifutis</option>
                    <option value="Hallinto">Hallinto</option>
                    <option value="Joukkuetoiminnan selvittäminen">Joukkuetoiminnan selvittäminen</option>
                    <option value="Valmennuspäällikön tehtävät">Valmennuspäällikön tehtävät</option>
                    <option value="Palloliiton kokoukset">Palloliiton kokoukset</option>
                    <option value="Strategia">Strategia</option>
                    <option value="Muu tehtävä">⚠️ Muu tehtävä (vaatii selitteen)</option>
                </select>

                <label for="hours">Tunnit (h):</label>
                <input type="number" id="hours" min="0.5" step="0.5" placeholder="Esim. 7.5" required>

                <label for="details">Tarkemmat lisätiedot / kommentit <span id="requiredLabel"></span>:</label>
                <textarea id="details" rows="2" placeholder="Kirjoita tarkennus tehdystä työstä..."></textarea>

                <button type="submit">Tallenna merkintä</button>
            </form>
        </section>

        <section id="reportSection">
            <h2>📊 Kuukausi- & Viikkoraportit</h2>
            <p id="reportSub">Ladataan tietoja pilvestä...</p>
            
            <div id="managerFilterContainer" class="filter-box" style="display: none;">
                <label for="managerViewFilter" style="margin-top:0; color: #fff;">🔍 Suodata työntekijöittäin:</label>
                <select id="managerViewFilter">
                    <option value="all">👥 Kaikki työntekijät</option>
                    <option value="Kim">👤 Kim</option>
                    <option value="Lari">👤 Lari</option>
                    <option value="Tapio">👤 Tapio</option>
                    <option value="Pete">👤 Pete</option>
                    <option value="Jouni">👤 Jouni</option>
                    <option value="Verneri">👤 Verneri</option>
                </select>
            </div>

            <div id="reportContainer">
                <p>Ladataan kirjauksia...</p>
            </div>
            
            <div id="globalSummaryContainer" class="summary-box" style="display:none;">
                <h3>📈 Seuran tunnit tehtävittäin</h3>
                <ul id="globalSummaryList"></ul>
            </div>

            <div class="button-group">
                <button id="downloadBtn" class="btn-info" style="display:none;">📥 Lataa Exceliin (CSV)</button>
                <button id="clearBtn" class="btn-danger" style="display:none;">🗑️ Tyhjennä tiedot</button>
            </div>
        </section>
    </div>
</div>

<script>
    // 🔗 OMA FIREBASE-LINKKISI (Muista tarkistaa!)
    const FIREBASE_URL = "https://seuran-tyoaika-default-rtdb.europe-west1.firebasedatabase.app/";

    const PIN_CONFIG = {
        "1111": { nimi: "Johtaja", rooli: "manager" },
        "2001": { nimi: "Kim", rooli: "employee" },
        "2002": { nimi: "Lari", rooli: "employee" },
        "2003": { nimi: "Tapio", rooli: "employee" },
        "2004": { nimi: "Pete", rooli: "employee" },
        "2005": { nimi: "Jouni", rooli: "employee" },
        "2006": { nimi: "Verneri", rooli: "employee" }
    };

    const PAIVA_TAVOITE = 7.5;
    let dataLog = [];
    let currentUser = null;

    const loginPage = document.getElementById('loginPage');
    const mainPage = document.getElementById('mainPage');
    const loginForm = document.getElementById('loginForm');
    const pinInput = document.getElementById('pinCode');
    const userDisplay = document.getElementById('userDisplay');
    const employeeSelect = document.getElementById('employee');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const managerFilterContainer = document.getElementById('managerFilterContainer');
    const managerViewFilter = document.getElementById('managerViewFilter');
    
    const workForm = document.getElementById('workForm');
    const reportContainer = document.getElementById('reportContainer');
    const reportSub = document.getElementById('reportSub');
    const taskSelect = document.getElementById('task');
    const detailsTextarea = document.getElementById('details');
    const requiredLabel = document.getElementById('requiredLabel');
    const globalSummaryContainer = document.getElementById('globalSummaryContainer');
    const globalSummaryList = document.getElementById('globalSummaryList');

    document.getElementById('date').valueAsDate = new Date();

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
        var startOfYear = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        return Math.ceil(( ( (d - startOfYear) / 86400000) + 1)/7);
    }

    const KUUKAUDET = ["Tammikuu", "Helmikuu", "Maaliskuu", "Huhtikuu", "Toukokuu", "Kesäkuu", "Heinäkuu", "Elokuu", "Syyskuu", "Lokakuu", "Marraskuu", "Joulukuu"];

    function haeTiedotPilvestä() {
        if (!FIREBASE_URL || FIREBASE_URL.includes("TÄHÄN SE")) return;
        fetch(`${FIREBASE_URL}logs.json`)
        .then(res => res.json())
        .then(data => {
            dataLog = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    dataLog.push({firebaseKey: key, ...data[key]});
                });
            }
            pivitaRaportti();
        })
        .catch(err => console.error(err));
    }

    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const pin = pinInput.value;
        if (PIN_CONFIG[pin]) {
            currentUser = PIN_CONFIG[pin];
            lataaKäyttöliittymä();
            haeTiedotPilvestä();
        } else {
            alert('Väärä PIN!');
            pinInput.value = '';
        }
    });

    managerViewFilter.addEventListener('change', pivitaRaportti);

    function lataaKäyttöliittymä() {
        loginPage.style.display = 'none';
        mainPage.style.display = 'block';
        userDisplay.innerText = currentUser.nimi;
        employeeSelect.innerHTML = '';

        if (currentUser.rooli === 'manager') {
            downloadBtn.style.display = 'inline-block';
            clearBtn.style.display = 'inline-block';
            managerFilterContainer.style.display = 'block';
            
            let html = '<option value="">Valitse työntekijä...</option>';
            for (let pin in PIN_CONFIG) {
                if (PIN_CONFIG[pin].rooli === 'employee') html += `<option value="${PIN_CONFIG[pin].nimi}">${PIN_CONFIG[pin].nimi}</option>`;
            }
            employeeSelect.innerHTML = html;
        } else {
            downloadBtn.style.display = 'none';
            clearBtn.style.display = 'none';
            managerFilterContainer.style.display = 'none';
            globalSummaryContainer.style.display = 'none';
            employeeSelect.innerHTML = `<option value="${currentUser.nimi}">${currentUser.nimi}</option>`;
        }
    }

    document.getElementById('logoutBtn').addEventListener('click', function() {
        currentUser = null; pinInput.value = ''; mainPage.style.display = 'none'; loginPage.style.display = 'block';
    });

    taskSelect.addEventListener('change', function() {
        if (taskSelect.value === "Muu tehtävä") {
            detailsTextarea.required = true; requiredLabel.innerHTML = '<span style="color:red;">(PAKOLLINEN)</span>';
        } else {
            detailsTextarea.required = false; requiredLabel.innerHTML = '';
        }
    });

    workForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const dateInput = document.getElementById('date').value;
        const dateStr = new Date(dateInput).toLocaleDateString('fi-FI');
        const employee = employeeSelect.value;
        const task = taskSelect.value;
        const hours = parseFloat(document.getElementById('hours').value);
        const details = detailsTextarea.value.trim();

        const newLog = { employee, task, hours, details, date: dateStr, isoDate: dateInput };

        fetch(`${FIREBASE_URL}logs.json`, { method: 'POST', body: JSON.stringify(newLog) })
        .then(() => {
            alert('Tallennettu pilveen!');
            workForm.reset();
            document.getElementById('date').valueAsDate = new Date();
            employeeSelect.value = employee;
            requiredLabel.innerHTML = '';
            haeTiedotPilvestä();
        });
    });

    if (clearBtn) {
        clearBtn.addEventListener('click', function() {
            if (confirm('Tyhjennetäänkö kaikki?')) {
                fetch(`${FIREBASE_URL}logs.json`, { method: 'DELETE' }).then(() => haeTiedotPilvestä());
            }
        });
    }

    if (downloadBtn) {
        downloadBtn.addEventListener('click', function() {
            if (dataLog.length === 0) return;
            let csvContent = "data:text/csv;charset=utf-8,\uFEFFPäivämäärä;Työntekijä;Tehtävä;Tunnit;Lisätiedot\r\n";
            dataLog.forEach(log => { csvContent += `${log.date};${log.employee};${log.task};${log.hours};${log.details.replace(/;/g, ',')}\r\n`; });
            const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", "seuran_tyoaikaraportti.csv");
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        });
    }

    function alustaHaitariKlikkaukset() {
        document.querySelectorAll('.accordion-trigger').forEach(trigger => {
            trigger.onclick = function() {
                const content = this.nextElementSibling;
                content.style.display = content.style.display === 'block' ? 'none' : 'block';
                this.querySelector('.arrow').innerText = content.style.display === 'block' ? '▲' : '▼';
            };
        });
        document.querySelectorAll('.day-trigger').forEach(trigger => {
            trigger.onclick = function() {
                const content = this.nextElementSibling;
                content.style.display = content.style.display === 'block' ? 'none' : 'block';
                this.querySelector('.arrow-day').innerText = content.style.display === 'block' ? '▲' : '▼';
            };
        });
    }

    function pivitaRaportti() {
        if (!currentUser) return;
        reportContainer.innerHTML = '';
        reportSub.innerText = "Tiedot synkronoitu reaaliajassa pilvestä.";
        if (dataLog.length === 0) { reportContainer.innerHTML = '<p>Ei vielä kirjauksia.</p>'; return; }

        const taskTotals = {};
        let suodatetutLogit = currentUser.rooli !== 'manager' ? dataLog.filter(log => log.employee === currentUser.nimi) : dataLog;
        
        if (currentUser.rooli === 'manager' && managerViewFilter.value !== 'all') {
            suodatetutLogit = dataLog.filter(log => log.employee === managerViewFilter.value);
        }

        dataLog.forEach(log => { taskTotals[log.task] = (taskTotals[log.task] || 0) + log.hours; });

        if (currentUser.rooli === 'manager') {
            globalSummaryContainer.style.display = 'block'; globalSummaryList.innerHTML = '';
            for (const task in taskTotals) globalSummaryList.innerHTML += `<li><strong>${task}:</strong> ${taskTotals[task]} h</li>`;
        }

        const hierarchy = {};
        suodatetutLogit.forEach(log => {
            let dObj = log.isoDate ? new Date(log.isoDate) : null;
            if(!dObj) { const osat = log.date.split('.'); dObj = new Date(osat[2], osat[1]-1, osat[0]); }
            const kkNimi = `${KUUKAUDET[dObj.getMonth()]} ${dObj.getFullYear()}`;
            const viikko = getWeekNumber(dObj);
            if (!hierarchy[kkNimi]) hierarchy[kkNimi] = {};
            if (!hierarchy[kkNimi][viikko]) hierarchy[kkNimi][viikko] = {};
            if (!hierarchy[kkNimi][viikko][log.date]) hierarchy[kkNimi][viikko][log.date] = [];
            hierarchy[kkNimi][viikko][log.date].push(log);
        });

        for (const kk in hierarchy) {
            const monthBox = document.createElement('div'); monthBox.className = 'month-section';
            let monthHtml = `<div class="month-header">📅 ${kk}</div>`;
            const viikot = Object.keys(hierarchy[kk]).sort((a,b) => b - a);
            
            viikot.forEach(vko => {
                let vkoTunnit = 0; const tyontekijanPaivat = {};
                for (const d in hierarchy[kk][vko]) {
                    hierarchy[kk][vko][d].forEach(l => {
                        vkoTunnit += l.hours;
                        if (!tyontekijanPaivat[l.employee]) tyontekijanPaivat[l.employee] = new Set();
                        tyontekijanPaivat[l.employee].add(d);
                    });
                }
                let velvoite = 0; for (const e in tyontekijanPaivat) velvoite += tyontekijanPaivat[e].size * PAIVA_TAVOITE;
                const vkoSaldo = vkoTunnit - velvoite;

                monthHtml += `
                    <div class="accordion-item">
                        <div class="accordion-trigger">
                            <span>📋 Viikko ${vko} <span class="tag">${vkoTunnit} h</span></span>
                            <span class="${vkoSaldo >= 0 ? 'saldo-plus' : 'saldo-miinus'}">Saldo: ${vkoSaldo >= 0 ? '+' : ''}${vkoSaldo.toFixed(1)}h</span>
                            <span class="arrow">▼</span>
                        </div>
                        <div class="accordion-content">
                `;

                const paivat = Object.keys(hierarchy[kk][vko]).sort((a,b) => {
                    const m = p => { const o = p.split('.'); return new Date(o[2], o[1]-1, o[0]); }; return m(b) - m(a);
                });

                paivat.forEach(pva => {
                    let pvaTunnit = 0; hierarchy[kk][vko][pva].forEach(l => pvaTunnit += l.hours);
                    monthHtml += `
                        <div class="day-item">
                            <div class="day-trigger"><span>🗓️ ${pva}</span><span><strong>${pvaTunnit} h</strong> <span class="arrow-day">▼</span></span></div>
                            <div class="day-content">
                    `;
                    hierarchy[kk][vko][pva].forEach(log => {
                        monthHtml += `
                            <div style="padding: 6px 0; border-bottom: 1px dashed #333;">
                                <strong>👤 ${log.employee}</strong> — ${log.task} (<strong>${log.hours}h</strong>)
                                ${log.details ? `<br><small style="color:#bbb; font-style:italic;">✍️ "${log.details}"</small>` : ''}
                            </div>
                        `;
                    });
                    monthHtml += `</div></div>`;
                });
                monthHtml += `</div></div>`;
            });
            monthBox.innerHTML = monthHtml; reportContainer.appendChild(monthBox);
        }
        alustaHaitariKlikkaukset();
    }
</script>
</body>
</html>
